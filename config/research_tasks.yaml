# ── Research Tasks Configuration ─────────────────────────────────────────────
# Controls how `task_generator.py` distributes batch work across skills.
# Edit this file to customize batch runs without changing code.
#
# Usage:
#   python -m agentiq_labclaw.task_generator --count 100 --config config/research_tasks.yaml
# ─────────────────────────────────────────────────────────────────────────────

# Task distribution weights — how to allocate N tasks across skill types.
# Weights are relative (0.20 = 20% of total batch).  Add up to ~1.0.
distribution:
  neoantigen_prediction: 0.20   # Cancer: somatic variant → neoantigen prediction
  structure_cancer:      0.08   # Cancer: protein structure prediction (ESMFold)
  structure_drug:        0.08   # Drug:   target protein structure prediction
  qsar:                  0.15   # Drug:   QSAR model training (ChEMBL datasets)
  molecular_docking:     0.15   # Drug:   virtual screening via docking
  variant_pathogenicity: 0.20   # Rare:   ClinVar/CADD pathogenicity scoring
  sequencing_qc_cancer:  0.07   # Cancer: sequencing quality control
  sequencing_qc_rare:    0.07   # Rare:   sequencing quality control
  # Veterinary — only activated when --domain canine or --domain feline is used
  neoantigen_dog:        0.40   # Canine: somatic variant → neoantigen prediction
  variant_dog:           0.40   # Canine: variant pathogenicity scoring
  neoantigen_cat:        0.40   # Feline: somatic variant → neoantigen prediction
  variant_cat:           0.40   # Feline: variant pathogenicity scoring

# Custom tasks — specific jobs to include in every batch run.
