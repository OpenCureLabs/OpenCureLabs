[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

markers =
    gpu: marks tests that require a GPU (deselect with '-m "not gpu"')
    integration: marks tests that run against real log files (deselect with '-m "not integration"')

addopts = -v --tb=short
