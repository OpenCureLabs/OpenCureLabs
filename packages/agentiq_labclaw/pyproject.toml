[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentiq_labclaw"
version = "0.1.0"
description = "LabClaw — Scientific skill layer for OpenCure Labs, built on NVIDIA NeMo AgentIQ"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "psycopg2-binary>=2.9",
    "requests>=2.28",
    "nvidia-nat>=1.5.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[project.entry-points."nat.components"]
labclaw_skills = "agentiq_labclaw.nat_plugin"

[tool.setuptools.packages.find]
include = ["agentiq_labclaw*"]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "S", "B", "UP"]
ignore = ["S101"]  # allow assert in tests

[tool.bandit]
exclude_dirs = ["tests"]
skips = ["B101"]  # allow assert
