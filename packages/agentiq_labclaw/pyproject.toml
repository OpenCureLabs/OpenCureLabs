[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentiq_labclaw"
version = "0.39.0"
description = "LabClaw — Scientific skill layer for OpenCure Labs, built on NVIDIA NeMo AgentIQ"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0",
    "psycopg2-binary>=2.9",
    "requests>=2.28",
    "nvidia-nat>=1.5.0",
    "rdkit>=2024.3",
    "scikit-learn>=1.4",
    "numpy>=1.26",
    "pandas>=2.2",
    "reportlab>=4.1",
    "anthropic>=0.25",
    "openai>=1.20",
    "langchain-core>=0.3",
    "langchain-openai>=0.3",
    "langgraph>=1.0",
]
[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]
[project.scripts]
opencure = "agentiq_labclaw.cli:main"
[project.entry-points."nat.components"]
labclaw_skills = "agentiq_labclaw.nat_plugin"
[tool.setuptools.packages.find]
include = ["agentiq_labclaw*"]
[tool.setuptools.package-data]
agentiq_labclaw = ["bundled_data/*.vcf"]
[tool.ruff]
target-version = "py311"
line-length = 120
[tool.ruff.lint]
select = ["E", "F", "W", "I", "S", "B", "UP"]
ignore = ["S101"]  # allow assert in tests
[tool.bandit]
exclude_dirs = ["tests"]
skips = ["B101"]  # allow assert
