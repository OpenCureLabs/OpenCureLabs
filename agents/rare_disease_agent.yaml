# Rare Disease Agent — Variant Analysis specialist configuration
#
# Analyzes rare and de novo variants against ClinVar/OMIM databases
# to assess pathogenicity, identify candidate genes, and support diagnosis.
#
# Supports multiple species via LABCLAW_SPECIES env var:
#   human → ClinVar + OMIM + CADD
#   dog   → OMIA + Ensembl VEP (CanFam3.1)
#   cat   → OMIA + Ensembl VEP (felCat9)
#
# Backed by NAT specialist_agent registration in nat_specialists.py
# Coordinator YAML entry: rare_disease_agent (_type: specialist_agent)

agent:
  name: rare_disease_agent
  role: Variant Analysis
  compute: local  # RTX 5070

  skills:
    - variant_pathogenicity
    - sequencing_qc

  data_sources:
    - ClinVar    # human pathogenic variants
    - OMIM       # human gene-disease associations
    - OMIA       # veterinary variant database (dogs, cats, and 250+ species)

  species_support:
    human: { ref: GRCh38,   variant_db: ClinVar+OMIM, effect_predictor: CADD }
    dog:   { ref: CanFam3.1, variant_db: OMIA, effect_predictor: EnsemblVEP }
    cat:   { ref: felCat9,   variant_db: OMIA, effect_predictor: EnsemblVEP }

  pipelines:
    variant_analysis:
      description: "Analyze variants for pathogenicity and gene-disease associations"
      steps:
        - sequencing_qc
        - variant_calling
        - variant_pathogenicity  # routes to ClinVar (human) or OMIA+VEP (vet)
        - candidate_gene_ranking

    de_novo_analysis:
      description: "Identify and score de novo variants in trios"
      steps:
        - sequencing_qc
        - trio_variant_calling
        - inheritance_filtering
        - variant_pathogenicity
