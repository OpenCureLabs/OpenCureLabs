name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Only run if the commit is not already a bump commit (avoid loops)
    if: "!startsWith(github.event.head_commit.message, 'bump:')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for commitizen
          token: ${{ secrets.RELEASE_PAT }}  # PAT required to push to protected branch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install commitizen
        run: pip install commitizen

      - name: Configure git
        run: |
          git config --local user.email "agent@opencurelabs"
          git config --local user.name "OpenCure Labs Agent"

      - name: Bump version
        id: bump
        run: |
          if cz bump --changelog --yes 2>&1; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "version=$(cz version --project)" >> "$GITHUB_OUTPUT"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push changes
        if: steps.bump.outputs.bumped == 'true'
        run: |
          git push origin main --tags

      - name: Build wheel
        if: steps.bump.outputs.bumped == 'true'
        run: |
          pip install build
          python -m build packages/agentiq_labclaw/ --outdir dist/

      - name: Create GitHub Release
        if: steps.bump.outputs.bumped == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            dist/*.whl \
            --title "v${{ steps.bump.outputs.version }}" \
            --notes-file CHANGELOG.md \
            --latest
