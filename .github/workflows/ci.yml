name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: opencurelabs
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_URL: postgresql://postgres:postgres@localhost:5433/opencurelabs

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip uv
          # Use uv for fast resolution. --override forces pyarrow/dateutil
          # past conflicting transitive pins (gtfparse<14.1, vastai==2.6.1).
          echo 'pyarrow==23.0.1' > /tmp/overrides.txt
          echo 'python-dateutil>=2.8.2' >> /tmp/overrides.txt
          uv pip install --system --override /tmp/overrides.txt -r requirements.txt
          uv pip install --system --override /tmp/overrides.txt -e packages/agentiq_labclaw

      - name: Apply database schema
        run: |
          PGPASSWORD=postgres psql -h localhost -p 5433 -U postgres -d opencurelabs -f db/schema.sql

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=packages/agentiq_labclaw --cov-report=term-missing --cov-fail-under=60

      - name: Lint (ruff)
        run: ruff check packages/ pipelines/ dashboard/ --output-format=github
        if: always()

      - name: Security scan (bandit)
        run: bandit -r packages/agentiq_labclaw/agentiq_labclaw -q -l
        if: always()
