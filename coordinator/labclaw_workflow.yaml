# coordinator/labclaw_workflow.yaml
# OpenCure Labs — Hierarchical multi-agent coordinator workflow
#
# Architecture:
#   Coordinator (Gemini 2.5 Flash Lite)
#     ├── Cancer Agent        → neoantigen, structure_prediction, sequencing_qc
#     │                         (also handles canine/feline oncology via species=dog/cat)
#     ├── Rare Disease Agent  → variant_pathogenicity, sequencing_qc
#     │                         (also handles canine/feline variants via OMIA)
#     ├── Drug Response Agent → qsar, molecular_docking, structure_prediction
#     └── Utility tools       → register_source, report_generator
#
# Run with: nat run --config_file coordinator/labclaw_workflow.yaml --input "your task"

llms:
  coordinator_llm:
    _type: openai
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    model_name: gemini-2.5-flash-lite
    api_key: ${GENAI_API_KEY}
    temperature: 0.0

functions:
  # ── Individual skills (referenced by specialist agents) ──────────────────
  neoantigen_prediction:
    _type: labclaw_skill
    skill_name: neoantigen_prediction

  structure_prediction:
    _type: labclaw_skill
    skill_name: structure_prediction

  molecular_docking:
    _type: labclaw_skill
    skill_name: molecular_docking

  qsar:
    _type: labclaw_skill
    skill_name: qsar

  variant_pathogenicity:
    _type: labclaw_skill
    skill_name: variant_pathogenicity

  sequencing_qc:
    _type: labclaw_skill
    skill_name: sequencing_qc

  register_discovered_source:
    _type: labclaw_skill
    skill_name: register_source

  report_generator:
    _type: labclaw_skill
    skill_name: report_generator

  grok_research:
    _type: labclaw_skill
    skill_name: grok_research

  # ── Specialist agents (each a ReAct agent with a curated skill subset) ───────────
  cancer_agent:
    _type: specialist_agent
    llm_name: coordinator_llm
    description: "Specialist agent for tumor immunology, cancer genomics, and veterinary oncology (canine and feline)"
    specialty_domain: tumor_immunology
    system_prompt: >
      You are a specialist agent for tumor immunology and cancer genomics.
      You MUST call your tools to do real work. NEVER respond with text alone.

      MANDATORY: For EVERY task, call the appropriate tool immediately:
      - neoantigen_prediction: Call with sample_id, vcf_path, hla_alleles, tumor_type, species
      - structure_prediction: Call for protein structure tasks
      - sequencing_qc: Call for quality control tasks

      Extract parameters from the task description and pass them to the tool.
      For example, if the task says "VCF path: data/human/esophageal/tp53_somatic.vcf",
      use that exact path as the vcf_path argument.

      Do NOT ask for more information. Do NOT say "I need the path".
      All required parameters are in the task description — extract and use them.
      For veterinary tasks (species=dog or species=cat), use DLA/FLA alleles.
    tool_names:
      - neoantigen_prediction
      - structure_prediction
      - sequencing_qc

  rare_disease_agent:
    _type: specialist_agent
    llm_name: coordinator_llm
    description: "Specialist agent for rare disease variant analysis, including canine and feline variant pathogenicity"
    specialty_domain: variant_analysis
    system_prompt: >
      You are a specialist agent for rare disease variant analysis.
      You MUST call your tools to do real work. NEVER respond with text alone.

      MANDATORY: For EVERY task, call the appropriate tool immediately:
      - variant_pathogenicity: Call with gene, variant_id, species
      - sequencing_qc: Call for quality control tasks

      Extract parameters from the task description and pass them to the tool.
      Do NOT ask for more information — all parameters are in the task description.
      For animal variants (species=dog or species=cat), use OMIA for annotation.
    tool_names:
      - variant_pathogenicity
      - sequencing_qc

  drug_response_agent:
    _type: specialist_agent
    llm_name: coordinator_llm
    description: "Specialist agent for drug response prediction"
    specialty_domain: drug_response
    system_prompt: >
      You are a specialist agent for drug response prediction.
      You MUST call your tools to do real work. NEVER respond with text alone.

      MANDATORY: For EVERY task, call the appropriate tool immediately:
      - qsar: Call with dataset_path, target_column, smiles_column, model_type
      - molecular_docking: Call with ligand_smiles, receptor_pdb, center coords, box_size
      - structure_prediction: Call for protein structure tasks

      Extract parameters from the task description and pass them to the tool.
      Do NOT ask for more information — all parameters are in the task description.
    tool_names:
      - qsar
      - molecular_docking
      - structure_prediction

# ── Hierarchical Coordinator Workflow ──────────────────────────────────────
workflow:
  _type: hierarchical_coordinator
  llm_name: coordinator_llm
  description: "LabClaw hierarchical coordinator — routes tasks to domain-specialist agents"
  specialist_names:
    - cancer_agent
    - rare_disease_agent
    - drug_response_agent
  utility_tool_names:
    - register_discovered_source
    - report_generator
    - grok_research
  verbose: true

# ── LabClaw runtime settings (NOT parsed by NAT — loaded by orchestrator.py) ──
# These are stored in a separate config read by agentiq_labclaw.orchestrator at runtime.
# See packages/agentiq_labclaw/agentiq_labclaw/orchestrator.py for usage.
#
# guardrails:
#   output_validation: true
#   novelty_filter: true
#   safety_check: true
#
# publishers:
#   pdf:
#     enabled: true
#     output_dir: reports/
#   r2:
#     enabled: true
#     # Users set OPENCURELABS_INGEST_URL in .env — no cloud credentials required
